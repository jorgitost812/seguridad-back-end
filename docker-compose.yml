version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: seguridad-db
    environment:
      POSTGRES_USER: seguridad_user
      POSTGRES_PASSWORD: seguridad_pass
      POSTGRES_DB: seguridad
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seguridad_user -d seguridad']
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
    driver: local
